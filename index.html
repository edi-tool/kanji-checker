<body>

    <div class="container">
        <h1>常用漢字さん</h1>
        <span class="subtitle">PDFまたはWord(.docx)からテキストを抽出し、表外漢字を指摘します</span>
        
        <div class="instruction">PDFまたはWord(.docx)ファイルを読み込む</div>
        <input type="file" id="fileInput" aria-label="PDFまたはWordファイルを選択" accept=".pdf, application/pdf, .docx, application/vnd.openxmlformats-officedocument.wordprocessingml.document">
        <div id="errorMsg" class="error-msg" role="alert" aria-live="polite"></div>
        
        <div id="resultArea">
            <p class="placeholder-text">ファイルを読み込むと、検出された表外漢字と文脈が表示されます。</p>
        </div>
    </div>

    </footer>

    <script>
        // PDF.js workerの設定
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            const errorMsg = document.getElementById("errorMsg");
            const resultArea = document.getElementById("resultArea");

            // 初期化
            errorMsg.textContent = "";
            if (!file) return;

            const fileName = file.name.toLowerCase();
            const isPDF = file.type === 'application/pdf' || fileName.endsWith('.pdf');
            const isWord = file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' || fileName.endsWith('.docx');

            if (!isPDF && !isWord) {
                errorMsg.textContent = "※PDFまたはWord(.docx)ファイルを選択してください。";
                return;
            }

            try {
                resultArea.innerHTML = '<p class="placeholder-text">解析中...</p>';
                
                const arrayBuffer = await file.arrayBuffer();
                let fullText = "";

                if (isPDF) {
                    // PDFのテキスト抽出処理
                    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join('');
                    }
                } else if (isWord) {
                    // Word(.docx)のテキスト抽出処理 (Mammoth.jsを使用)
                    const result = await mammoth.extractRawText({arrayBuffer: arrayBuffer});
                    fullText = result.value;
                }

                analyzeKanji(fullText);

            } catch (err) {
                console.error(err);
                errorMsg.textContent = "ファイルの解析に失敗しました。";
                resultArea.innerHTML = '<p class="placeholder-text">読み込みエラーが発生しました。</p>';
            }
        });

        function analyzeKanji(text) {
            text = text.normalize('NFKC'); // CJK互換漢字（U+F900–U+FAFF）をCJK統合漢字に正規化
            // \p{Script=Han} で「漢字」プロパティを持つすべての文字にマッチさせます。
            const kanjiRegex = /\p{Script=Han}/gu;
            const results = {}; // { '漢字': [文脈1, 文脈2] }
            const contextPadding = 15;
            let match;

            // joyoKanji は kanji_data.js から読み込まれている前提
            if (typeof joyoKanji === 'undefined') {
                document.getElementById("errorMsg").textContent = "常用漢字リスト(kanji_data.js)が見つかりません。";
                return;
            }

            while ((match = kanjiRegex.exec(text)) !== null) {
                const char = match[0];
                const index = match.index;

                // 常用漢字リストに含まれていない場合
                if (!joyoKanji.includes(char)) {
                    const start = Math.max(0, index - contextPadding);
                    const end = Math.min(text.length, index + contextPadding + 1);
                    const context = text.substring(start, end);

                    if (!results[char]) results[char] = new Set();
                    results[char].add(context);
                }
            }

            renderResults(results);
        }

        function renderResults(results) {
            const resultArea = document.getElementById("resultArea");
            const kanjis = Object.keys(results);

            if (kanjis.length === 0) {
                resultArea.innerHTML = '<p class="placeholder-text" style="color:#2e7d32; font-weight:600;">常用外漢字は見つかりませんでした。</p>';
                return;
            }

            resultArea.innerHTML = "";
            kanjis.sort().forEach(kanji => {
                const group = document.createElement("div");
                group.className = "kanji-group";

                const header = document.createElement("div");
                header.className = "kanji-header";
                header.innerHTML = `<span class="kanji-char">${kanji}</span>`;
                group.appendChild(header);

                const list = document.createElement("ul");
                list.className = "context-list";
                
                results[kanji].forEach(ctx => {
                    const li = document.createElement("li");
                    li.className = "context-item";
                    // 該当漢字をハイライト
                    const highlighted = ctx.replace(new RegExp(kanji, 'g'), `<span class="highlight">${kanji}</span>`);
                    li.innerHTML = `...${highlighted}...`;
                    list.appendChild(li);
                });

                group.appendChild(list);
                resultArea.appendChild(group);
            });
        }
    </script>
